<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Numo — Account Deletion</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Arial, sans-serif; margin: 0; background:#0b0b0c; color:#fff; }
        .wrap { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        a { color: #9ad1ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
        h1 { margin: 14px 0 8px; font-size: 28px; }
        p, li { line-height: 1.65; opacity: 0.92; }
        .card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; padding: 18px; margin-top: 16px; }
    </style>
</head>
<body>
<div class="wrap">
    <a href="/index.html">← Back</a>
    <h1>Account Deletion</h1>

    <div class="card">
        <p><strong>Delete your account in the app:</strong></p>
        <ol>
            <li>Open Numo</li>
            <li>Go to <strong>Settings</strong></li>
            <li>Select <strong>Delete account</strong> and confirm</li>
        </ol>
        <p>
            This action is intended to remove your account and associated stored data from our servers.
        </p>
    </div>

    <p>
        Need help? Contact <a href="mailto:fedichkin.artur@gmail.com">fedichkin.artur@gmail.com</a>.
    </p>
</div>
</body>
</html>
